name: Update Picks

on:
  schedule:
    # 每個工作日 UTC 00:00（台灣時間 08:00）
    - cron: '0 0 * * 1-5'
  workflow_dispatch:  # 可手動在 GitHub 網頁上觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build script
        run: python scripts/build_predictions.py

      - name: Commit & push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update predictions [skip ci]"
          file_pattern: public/data/predictions.json
