name: Update Picks

on:
  schedule:
    # 週一至週六 UTC 07:30（台灣時間 15:30，台股收盤後）
    - cron: '30 7 * * 1-6'
  workflow_dispatch:  # 可手動在 GitHub 網頁上觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build scripts
        run: |
          python scripts/build_predictions.py
          python scripts/build_stock_picks.py

      - name: Commit & push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update picks data [skip ci]"
          file_pattern: public/data/predictions.json public/data/stock_picks.json public/data/stock_history.json
